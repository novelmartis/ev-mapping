name: Sync EV Car Presets

on:
  schedule:
    - cron: "30 2 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-car-presets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Regenerate catalog
        run: |
          python3 scripts/sync_car_presets.py --from-year 2025 --to-year 2026

      - name: Guard against fallback-only catalog
        env:
          MIN_PRESET_COUNT: "50"
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("data/car-presets.generated.json")
          data = json.loads(path.read_text())
          count = int(data.get("count", 0))
          print(f"Catalog count: {count}")

          min_count = int(os.environ["MIN_PRESET_COUNT"])
          if count < min_count:
              raise SystemExit(
                  f"Refusing to commit fallback/suspicious catalog: count={count} < {min_count}"
              )
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/car-presets.generated.json; then
            echo "No catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/car-presets.generated.json
          git commit -m "chore: refresh EV car presets catalog"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done

          echo "Push failed after retries."
          exit 1
