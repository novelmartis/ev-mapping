name: Sync EV Car Presets

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-car-presets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Snapshot previous catalog
        run: |
          cp data/car-presets.generated.json /tmp/car-presets.previous.json || true

      - name: Regenerate catalog
        run: |
          python3 scripts/sync_car_presets.py \
            --from-year 2025 \
            --to-year 2026 \
            --min-preset-count 50 \
            --min-price-coverage 0.03 \
            --max-count-drop-ratio 0.45

      - name: Validate catalog integrity and anti-regression guardrails
        run: |
          python3 scripts/validate_car_catalog.py \
            --catalog data/car-presets.generated.json \
            --previous /tmp/car-presets.previous.json \
            --min-count 50 \
            --min-price-coverage 0.03 \
            --min-market-count 2 \
            --max-drop-ratio 0.45

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/car-presets.generated.json; then
            echo "No catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/car-presets.generated.json
          git commit -m "chore: refresh EV car presets catalog"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done

          echo "Push failed after retries."
          exit 1
