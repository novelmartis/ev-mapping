name: Promote EV Car Presets (Canary -> Stable)

on:
  schedule:
    - cron: "50 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-car-presets
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Snapshot previous stable catalog
        run: |
          cp data/car-presets.generated.json /tmp/car-presets.previous.json || true

      - name: Validate canary catalog before promotion
        run: |
          python3 scripts/validate_car_catalog.py \
            --catalog data/car-presets.generated.next.json \
            --manifest data/catalog-next/catalog_manifest.json \
            --require-manifest \
            --previous /tmp/car-presets.previous.json \
            --min-count 50 \
            --min-price-coverage 0.03 \
            --min-market-count 5 \
            --max-drop-ratio 0.45 \
            --min-market-preset US=300 \
            --min-market-preset IN=20 \
            --min-market-preset AU=20 \
            --min-market-preset DE=20 \
            --min-market-preset SG=12 \
            --min-market-preset CN=12

      - name: Run market smoke checks (canary)
        run: |
          python3 scripts/check_market_smoke.py \
            --catalog data/car-presets.generated.next.json \
            --city Sydney:AU:8:500

      - name: Promote canary catalog to stable paths
        run: |
          python3 scripts/promote_catalog.py \
            --canary-catalog data/car-presets.generated.next.json \
            --canary-manifest data/catalog-next/catalog_manifest.json \
            --stable-catalog data/car-presets.generated.json \
            --stable-manifest data/catalog/catalog_manifest.json \
            --stable-markets-dir data/catalog/markets

      - name: Validate promoted stable catalog
        run: |
          python3 scripts/validate_car_catalog.py \
            --catalog data/car-presets.generated.json \
            --manifest data/catalog/catalog_manifest.json \
            --require-manifest \
            --previous /tmp/car-presets.previous.json \
            --min-count 50 \
            --min-price-coverage 0.03 \
            --min-market-count 5 \
            --max-drop-ratio 0.45 \
            --min-market-preset US=300 \
            --min-market-preset IN=20 \
            --min-market-preset AU=20 \
            --min-market-preset DE=20 \
            --min-market-preset SG=12 \
            --min-market-preset CN=12

      - name: Run market smoke checks (stable)
        run: |
          python3 scripts/check_market_smoke.py \
            --catalog data/car-presets.generated.json \
            --city Sydney:AU:8:500

      - name: Commit and push promoted stable catalog if changed
        run: |
          if git diff --quiet -- data/car-presets.generated.json data/catalog/; then
            echo "No stable catalog changes after promotion."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/car-presets.generated.json data/catalog/
          git commit -m "chore: promote EV canary catalog to stable"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done

          echo "Push failed after retries."
          exit 1
